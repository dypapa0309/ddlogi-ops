<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DDLOGI OPS | Admin Calendar</title>
  <link rel="stylesheet" href="/apps/admin/styles.css?v=3" />
</head>
<body>
  <header class="top">
    <div class="wrap topInner">
      <div>
        <div class="titleRow">
          <h1 class="h1">운영 캘린더 (Admin)</h1>
          <span id="connPill" class="pill pill-muted">연결 확인중</span>
        </div>
        <p class="sub" id="subText">confirmed 건이 캘린더에 자동 등록됩니다.</p>
      </div>
      <div class="topActions">
        <button id="btnToday" class="btn">오늘</button>
        <button id="btnPrev" class="btn">◀</button>
        <button id="btnNext" class="btn">▶</button>
        <button id="btnOrderReg" class="btn">주문서 등록</button>
        <button id="btnRefresh" class="btn btn-primary">새로고침</button>
        <button id="btnLogout" class="btn btn-link">로그아웃</button>
      </div>
    </div>
  </header>

  

  <section class="wrap">
    <section id="orderRegPanel" class="card orderRegPanel hidden">
      <div class="row between">
        <div>
          <div class="sideTitle">주문서 등록</div>
          <div class="muted small">문자 주문서를 그대로 붙여넣고 파싱 후 저장하면 confirmed/open 상태로 등록돼.</div>
        </div>
        <div class="row">
          <button id="btnParseOrder" class="btn">파싱</button>
          <button id="btnSaveOrder" class="btn btn-primary">저장</button>
          <button id="btnClearOrder" class="btn">초기화</button>
        </div>
      </div>
      <textarea id="orderRawInput" class="input textarea mt10" placeholder="문자 주문서를 여기에 그대로 붙여넣어줘"></textarea>
      <div class="regGrid mt10">
        <div>
          <div class="muted small">관리자 미리보기</div>
          <pre id="orderPreviewAdmin" class="debugBox mt10">파싱 결과가 여기에 보여.</pre>
        </div>
        <div>
          <div class="muted small">기사 미리보기</div>
          <pre id="orderPreviewDriver" class="debugBox mt10">기사에게 노출될 정보만 여기에 보여.</pre>
        </div>
      </div>
    </section>
  </section>

  <main class="wrap grid2">
    <section class="card">
      <div class="row between">
        <div class="monthTitle" id="monthTitle">-</div>
        <div class="row">
          <select id="statusFilter" class="input">
            <option value="">전체</option>
            <option value="confirmed">confirmed</option>
            <option value="canceled">canceled</option>
          </select>
        </div>
      </div>

      <div class="weekHead">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      </div>
      <div id="monthGrid" class="monthGrid"></div>

      <div class="hint mt10" id="statusText">-</div>
    </section>

    <aside class="card side">
      <div class="sideTitle" id="sideTitle">선택한 날짜</div>
      <div id="sideList" class="sideList"></div>

      <div class="divider"></div>

      <div class="muted small">선택한 이벤트 상세</div>
      <div class="row mt10" style="justify-content:flex-end; gap:8px;">
        <button id="btnToggleRaw" class="btn ghost">원본(JSON) 보기</button>
      </div>
      <pre id="detailBox" class="debugBox mt10">{}</pre>
      <pre id="rawJsonBox" class="debugBox mt10 hidden">{}</pre>

      <div class="divider"></div>

      <div class="muted small">기사 배정</div>
      <div class="row mt10">
        <button id="btnLoadDrivers" class="btn">기사 목록 불러오기</button>
      </div>
      <select id="driverSelect" class="input mt10">
        <option value="">기사 선택</option>
      </select>
      <button id="btnAssignDriver" class="btn btn-primary mt10">선택 이벤트에 배정</button>

      <div class="divider"></div>

      <div class="muted small">운행 상태(ops_status)</div>
      <select id="opsSelect" class="input mt10">
        <option value="">(변경 안함)</option>
        <option value="open">open</option>
        <option value="assigned">assigned</option>
        <option value="in_progress">in_progress</option>
        <option value="completed">completed</option>
        <option value="hold">hold</option>
        <option value="closed">closed</option>
        <option value="canceled_ops">canceled_ops</option>
      </select>
      <button id="btnUpdateOps" class="btn btn-primary mt10">ops_status 업데이트</button>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="/shared/supabase-client.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/parser/orderParser.js"></script>
  <script src="/apps/admin/app.js"></script>
</body>
</html>
